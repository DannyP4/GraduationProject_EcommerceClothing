<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background-color:#E8E8E8;">
<div style="display:none;max-height:0;overflow:hidden;mso-hide:all;opacity:0;">Reset your Vesta password.</div>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#E8E8E8;">
    <tr>
        <td align="center" style="padding:28px 12px;">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;background-color:#ffffff;border:1px solid #d9d9d9;">
                <tr><td th:replace="~{email/_fragments :: header}"></td></tr>
                <tr>
                    <td style="padding:40px 40px 18px;">
                        <div style="font-family:Inter,Arial,Helvetica,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#E83354;margin-bottom:14px;">Account security</div>
                        <h1 style="margin:0 0 16px;font-family:'Anton','Arial Black',Impact,sans-serif;font-size:34px;line-height:0.95;letter-spacing:-0.01em;text-transform:uppercase;color:#0A0A0A;">Reset your password</h1>
                        <p style="margin:0;font-family:Inter,Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#555;">
                            Hi <span th:text="${recipientName}">there</span>, we received a request to reset the password for your Vesta account. Choose a new one below.
                        </p>
                        <div th:replace="~{email/_fragments :: cta(${actionUrl}, 'Reset password')}"></div>
                        <p style="margin:22px 0 0;font-family:Inter,Arial,Helvetica,sans-serif;font-size:13px;line-height:1.6;color:#999;">
                            This link expires in <span th:text="${expiryText}">60 minutes</span>. If you didn't request this, you can safely ignore this email &mdash; your password won't change.
                        </p>
                    </td>
                </tr>
                <tr><td th:replace="~{email/_fragments :: footer}"></td></tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
