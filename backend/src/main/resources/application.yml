spring:
  profiles:
    default: docker
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"

  datasource:
    url: jdbc:mysql://${db.host}:${db.port}/${db.name}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  thymeleaf:
    check-template-location: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope:
              - openid
              - email
              - profile

db:
  name: uniform_store

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900000}       # 15 minutes
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8088}
  i18n:
    supported-locales: en,vi,ja
    default-locale: en
  translation:
    deepl:
      enabled: ${DEEPL_ENABLED:true}
      api-key: ${DEEPL_API_KEY:}
      base-url: ${DEEPL_API_URL:https://api-free.deepl.com}
      timeout-seconds: 30
      batch-size: 40
  cart:
    low-stock-threshold: 5
    max-quantity-per-item: 99
  shipping:
    north: 25000
    central: 30000
    south: 35000
    free-threshold: 500000
    ghn:
      enabled: ${GHN_ENABLED:true}
      base-url: ${GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
      token: ${GHN_API_KEY:}
      shop-id: ${GHN_SHOP_ID:}
      from-district-id: ${GHN_FROM_DISTRICT_ID:3695}
      from-ward-code: ${GHN_FROM_WARD_CODE:}
      service-type-id: ${GHN_SERVICE_TYPE_ID:2}
      default-item-weight-grams: ${GHN_DEFAULT_ITEM_WEIGHT_GRAMS:500}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from-name: ${MAIL_FROM_NAME:Vesta}
    from-address: ${MAIL_FROM:${MAIL_USERNAME:}}
    support-email: ${MAIL_SUPPORT:${MAIL_FROM:${MAIL_USERNAME:}}}
  auth:
    reset-token-ttl-minutes: ${AUTH_RESET_TOKEN_TTL_MINUTES:60}
    verify-token-ttl-hours: ${AUTH_VERIFY_TOKEN_TTL_HOURS:48}
    admin-invite-ttl-hours: ${AUTH_ADMIN_INVITE_TTL_HOURS:24}
    oauth-handoff-ttl-seconds: ${AUTH_OAUTH_HANDOFF_TTL_SECONDS:120}
  captcha:
    enabled: ${CAPTCHA_ENABLED:true}
    turnstile:
      secret-key: ${TURNSTILE_SECRET_KEY:}
      verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
  notifications:
    retention-days: ${NOTIF_RETENTION_DAYS:90}
    cleanup-cron: ${NOTIF_CLEANUP_CRON:0 0 3 * * *}
  orders:
    pending-timeout-minutes: ${ORDER_PENDING_TIMEOUT_MINUTES:30}
    auto-cancel:
      enabled: ${ORDER_AUTO_CANCEL_ENABLED:true}
      interval-ms: ${ORDER_AUTO_CANCEL_INTERVAL_MS:300000}
      initial-delay-ms: ${ORDER_AUTO_CANCEL_INITIAL_DELAY_MS:60000}
  fx:
    vnd-usd-rate: 0.0000385
    provider: HARDCODED
    cache-ttl-seconds: 60
  payments:
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay/return}
      version: '2.1.0'
      currency-code: VND
      locale: vn
      command: pay
      expire-minutes: 15
    stripe:
      publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      success-url: ${FRONTEND_BASE_URL:http://localhost:5173}/payment/stripe/success?session_id={CHECKOUT_SESSION_ID}&order={ORDER_NUMBER}
      cancel-url: ${FRONTEND_BASE_URL:http://localhost:5173}/payment/stripe/cancel?order={ORDER_NUMBER}
      checkout-currency: usd
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    upload-folder: uniform/products
  tryon:
    fal:
      enabled: ${TRYON_ENABLED:true}
      api-key: ${FAL_KEY:}
      base-url: ${FAL_BASE_URL:https://queue.fal.run}
      model: ${FAL_TRYON_MODEL:fal-ai/fashn/tryon/v1.6}
      connect-timeout-seconds: 10
      read-timeout-seconds: 60
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      embedding-model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
      chat-model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
      embedding-dim: 3072
      batch-size: 100
      timeout-seconds: 30
    embeddings:
      backfill-on-startup: ${AI_EMBEDDINGS_BACKFILL_ON_STARTUP:false}
      auto-reconcile:
        enabled: ${AI_EMBEDDINGS_AUTO_RECONCILE:true}
        interval-ms: ${AI_EMBEDDINGS_AUTO_RECONCILE_INTERVAL_MS:900000}   # 15 minutes
  seed:
    enabled: true
    products-count: 50
    customers-count: 60
    orders-count: 50
    reviews-count: 20
  kaggle-import:
    enabled: ${KAGGLE_IMPORT_ENABLED:false}
    path: ${KAGGLE_IMPORT_PATH:}
    limit: ${KAGGLE_IMPORT_LIMIT:500}
  catalog-seed:
    enabled: ${CATALOG_SEED_ENABLED:true}

sentry:
  dsn: ${SENTRY_DSN_BACKEND:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.0
  send-default-pii: false
  enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

logging:
  level:
    root: INFO
    com.uniform.store: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

