spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:uniform_store}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:uniform}
    password: ${DB_PASSWORD:uniform_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:uniform-store-super-secret-key-change-in-production-must-be-at-least-256bits}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900000}       # 15 minutes
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8088}
  i18n:
    supported-locales: en,vi,ja
    default-locale: en
  cart:
    low-stock-threshold: 5
    max-quantity-per-item: 99
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  fx:
    vnd-usd-rate: 0.0000385
    provider: HARDCODED
    cache-ttl-seconds: 60
  payments:
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay/return}
      version: '2.1.0'
      currency-code: VND
      locale: vn
      command: pay
      expire-minutes: 15
    stripe:
      publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      success-url: ${FRONTEND_BASE_URL:http://localhost:5173}/payment/stripe/success?session_id={CHECKOUT_SESSION_ID}&order={ORDER_NUMBER}
      cancel-url: ${FRONTEND_BASE_URL:http://localhost:5173}/payment/stripe/cancel?order={ORDER_NUMBER}
      checkout-currency: usd

sentry:
  dsn: ${SENTRY_DSN_BACKEND:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.0
  send-default-pii: false
  enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

logging:
  level:
    root: INFO
    com.uniform.store: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 50
