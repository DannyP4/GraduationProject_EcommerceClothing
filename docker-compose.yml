# docker compose up -d mysql
services:
  mysql:
    image: mysql:8.0
    container_name: uniform_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-seeds DB on first boot
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uniform_backend
    depends_on:
      mysql:
        condition: service_healthy
    # Config from .env; DB URL overridden for compose network
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    ports:
      - "${BACKEND_PORT}:${SERVER_PORT}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: uniform_frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
